<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WIGO — Walk Your Adventure</title>
<meta name="theme-color" content="#7BD649" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WIGO" />
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --lime:#7BD649; --lime-dark:#4FA52B; --sky:#3DA9FC; --coral:#FF6B5E; --gold:#FFC93C; --purple:#8B5CF6; --orange:#FF8A1E;
    --ink:#1C1F24; --slate:#5B6470; --cloud:#D6DBE1; --mist:#F4F6F8; --surface:#FFFFFF;
    --shadow:0 6px 20px rgba(28,31,36,.10); --shadow-lg:0 16px 40px rgba(28,31,36,.18); --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--mist);color:var(--ink);line-height:1.45;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--mist);position:relative;}
  .screen{flex:1;overflow-y:auto;padding:0 16px 92px;}
  .screen::-webkit-scrollbar{display:none;}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 4px 10px;}
  .brand{font-weight:900;font-size:20px;letter-spacing:-.4px;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .brand .lg{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--lime),var(--lime-dark));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 6px 14px rgba(123,214,73,.35);}
  .brand small{font-weight:700;font-size:9.5px;color:var(--slate);display:block;letter-spacing:0;}
  .top-r{display:flex;gap:8px;align-items:center;}
  .coins{background:#fff;border-radius:999px;padding:7px 12px;font-weight:800;font-size:13.5px;color:#b07d00;box-shadow:var(--shadow);}
  .coins b{color:var(--ink);}
  .ic-btn{width:34px;height:34px;border-radius:11px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:15px;border:none;cursor:pointer;}
  .backbtn{border:none;background:none;color:var(--lime-dark);font-weight:800;font-size:15px;cursor:pointer;}

  .greet{font-size:20px;font-weight:900;letter-spacing:-.4px;margin-top:2px;}
  .greet-sub{font-size:12.5px;color:var(--slate);margin-top:2px;}
  h2.sec{font-size:14px;font-weight:800;margin:18px 2px 9px;}

  .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);}
  .muted{color:var(--slate);}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;background:var(--mist);color:var(--slate);}
  .chip.green{background:#e8f8dd;color:var(--lime-dark);} .chip.sky{background:#e2f1ff;color:#1f7fd1;}
  .chip.gold{background:#fff2cf;color:#b07d00;} .chip.coral{background:#ffe6e3;color:#d8453a;}
  .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;height:50px;border-radius:15px;font-size:15px;font-weight:800;border:none;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.97);} .btn:disabled{opacity:.55;}
  .btn.pri{background:var(--lime);color:#fff;box-shadow:0 8px 18px rgba(123,214,73,.4);}
  .btn.sec{background:#fff;color:var(--lime-dark);border:1.6px solid var(--lime);box-shadow:none;}
  .btn.dark{background:var(--ink);color:#fff;} .btn.coral{background:var(--coral);color:#fff;}
  .btn.sm{height:38px;width:auto;padding:0 16px;border-radius:12px;font-size:13px;box-shadow:none;}
  .xpbar{height:9px;border-radius:999px;background:#e7ebef;overflow:hidden;}
  .xpbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--lime),var(--lime-dark));transition:width .5s;}

  /* level card */
  .lvl{margin-top:14px;border-radius:20px;padding:15px 17px;color:#fff;background:linear-gradient(135deg,#8B5CF6,#3DA9FC);box-shadow:0 12px 26px rgba(139,92,246,.3);}
  .lvl .r{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:9px;}
  .lvl .lab{background:rgba(255,255,255,.22);padding:4px 11px;border-radius:10px;font-size:14px;}
  .lvl .xpbar{background:rgba(255,255,255,.28);} .lvl .xpbar>i{background:#fff;}
  .lvl .need{font-size:11px;opacity:.9;text-align:right;margin-top:6px;}

  /* hero */
  .hero{margin-top:14px;border-radius:24px;padding:22px 18px;text-align:center;color:#fff;position:relative;overflow:hidden;
    background:linear-gradient(140deg,#84db52,#4FA52B);box-shadow:0 14px 30px rgba(79,165,43,.36);}
  .hero::after{content:"";position:absolute;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.12);top:-66px;right:-44px;}
  .hero .dice{font-size:48px;display:inline-block;animation:bob 2.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-7px) rotate(8deg);}}
  .hero h3{font-size:18px;font-weight:900;margin:6px 0 15px;line-height:1.3;}
  .hero .roll{background:#fff;color:var(--lime-dark);height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;border:none;width:100%;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.16);}
  .hero .roll:active{transform:scale(.97);}

  /* summary stats */
  .summary{display:flex;gap:10px;margin-top:14px;}
  .stat{flex:1;background:#fff;border-radius:15px;padding:12px 10px;box-shadow:var(--shadow);text-align:center;border:none;cursor:default;position:relative;}
  .stat.tap{cursor:pointer;} .stat.tap:active{transform:scale(.97);}
  .stat.tap::after{content:'›';position:absolute;top:7px;right:10px;color:var(--cloud);font-weight:900;}
  .stat .val{font-size:18px;font-weight:900;} .stat .lab{font-size:10.5px;color:var(--slate);font-weight:700;margin-top:2px;}
  .stat .val.fire{color:var(--coral);} .stat .val.sky{color:var(--sky);} .stat .val.gold{color:#caa000;}

  /* pedometer */
  .steps{margin-top:14px;border-radius:20px;padding:16px 18px;color:#fff;background:linear-gradient(135deg,#3DA9FC,#8B5CF6);box-shadow:0 12px 26px rgba(61,169,252,.3);}
  .steps .r{display:flex;justify-content:space-between;align-items:flex-end;}
  .steps .big{font-size:34px;font-weight:900;letter-spacing:-.5px;line-height:1;}
  .steps .unit{font-size:14px;font-weight:800;opacity:.9;margin-left:3px;}
  .steps .sub{font-size:12px;opacity:.92;font-weight:700;margin-top:6px;}
  .steps .live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;background:rgba(255,255,255,.2);padding:5px 11px;border-radius:999px;}
  .steps .live .ld{width:7px;height:7px;border-radius:50%;background:#9dffb5;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .steps .pedbtn{margin-top:13px;background:rgba(255,255,255,.96);color:#1f74c0;border:none;height:44px;border-radius:13px;width:100%;font-weight:900;font-size:14px;cursor:pointer;}
  .steps .pedbtn:active{transform:scale(.97);}
  .steprw{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:9px;}
  .steprw .ic{font-size:24px;flex:none;} .steprw .t{font-weight:800;font-size:13.5px;} .steprw .s{font-size:11px;color:var(--slate);margin-top:1px;}
  .steprw .tail{margin-left:auto;}
  /* progress mission card */
  .prog{padding:14px 15px;margin-top:2px;}
  .prog .pt{display:flex;justify-content:space-between;align-items:center;}
  .prog .nm{font-size:15px;font-weight:800;}
  .prog .ds{font-size:11.5px;color:var(--slate);margin:6px 0 9px;}
  .prog .go{font-size:12px;font-weight:800;color:var(--lime-dark);}

  /* install */
  .install{margin-top:12px;background:#fff;border:1px dashed var(--lime);border-radius:15px;padding:11px 14px;display:none;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:700;}
  .install.show{display:flex;}

  /* sheet / overlay */
  .overlay{position:fixed;inset:0;background:rgba(20,23,28,.55);display:none;align-items:flex-end;justify-content:center;z-index:40;}
  .overlay.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:20px 18px calc(26px + env(safe-area-inset-bottom));animation:up .26s cubic-bezier(.2,.8,.2,1);max-height:92%;overflow-y:auto;}
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{font-size:18px;font-weight:900;}

  /* mission preview card */
  .mcard{border-radius:22px;overflow:hidden;box-shadow:var(--shadow);}
  .mcard .hd{background:linear-gradient(135deg,#2b9348,#1e7d35);color:#fff;padding:18px 18px 22px;}
  .mcard .label{font-size:10px;font-weight:800;letter-spacing:1.6px;opacity:.85;}
  .mcard .ttl{font-size:21px;font-weight:900;margin-top:4px;line-height:1.25;}
  .mcard .tags{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;}
  .mcard .tags .chip{background:rgba(255,255,255,.22);color:#fff;}
  .mcard .bd{padding:6px 18px 16px;background:#fff;}
  .mrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f5;font-size:13.5px;}
  .mrow:last-child{border:none;}
  .mrow .k{color:var(--slate);font-weight:700;} .mrow .v{font-weight:800;}
  .rewardbox{background:#fff8e6;border:1px solid #ffe6a3;border-radius:13px;padding:11px 14px;margin-top:8px;display:flex;align-items:center;gap:11px;}
  .rewardbox .em{font-size:24px;} .rewardbox .r1{font-size:14px;font-weight:900;color:#b07d00;} .rewardbox .r2{font-size:11px;color:#9a7b2e;}
  .dots{display:flex;gap:6px;align-items:center;justify-content:center;margin:14px 0 12px;font-size:11px;color:var(--slate);font-weight:700;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--lime);} .dot.off{background:#d6dbe1;}

  /* reward screen */
  .rwd{border-radius:24px;background:linear-gradient(160deg,#7BD649,#4FA52B);color:#fff;text-align:center;padding:30px 20px 22px;position:relative;overflow:hidden;}
  .rwd .big{font-size:46px;} .rwd h3{font-size:24px;font-weight:900;margin-top:4px;}
  .rwd .pts{font-size:30px;font-weight:900;margin:14px 0 4px;text-shadow:0 4px 12px rgba(0,0,0,.18);}
  .rwd .sub{font-size:13px;opacity:.92;}
  .rwd .nb{background:rgba(255,255,255,.18);border-radius:12px;padding:9px 14px;margin:14px 12px 0;font-size:12.5px;font-weight:800;}
  .conf{position:absolute;width:8px;height:13px;border-radius:2px;animation:fall 2.4s linear forwards;}
  @keyframes fall{to{transform:translateY(360px) rotate(540deg);opacity:0;}}

  /* quests */
  .quest{background:#fff;border-radius:16px;box-shadow:var(--shadow);margin-bottom:11px;padding:14px 15px;}
  .quest.locked{opacity:.72;}
  .quest .qh{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .quest .qt{font-weight:800;font-size:14px;} .quest .qr{font-size:11.5px;font-weight:800;color:var(--lime-dark);white-space:nowrap;}
  .quest .qf{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--slate);margin-top:7px;}

  /* calendar */
  .calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .navmo{border:none;background:var(--mist);width:36px;height:36px;border-radius:11px;font-size:18px;font-weight:900;color:var(--slate);cursor:pointer;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
  .cal .wd{text-align:center;font-size:11px;color:var(--slate);font-weight:800;padding-bottom:2px;}
  .cal .day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border-radius:50%;color:var(--ink);}
  .cal .day.att{background:var(--orange);color:#fff;box-shadow:0 3px 8px rgba(255,138,30,.45);}
  .cal .day.today{box-shadow:inset 0 0 0 2px var(--lime);}
  .cal .day.att.today{box-shadow:inset 0 0 0 2px #fff,0 3px 8px rgba(255,138,30,.5);}
  .cal .day.empty{visibility:hidden;}
  .legend{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--slate);}
  .legend .da{width:18px;height:18px;border-radius:50%;background:var(--orange);}

  /* rank */
  .seg{display:flex;background:#eef1f4;border-radius:13px;padding:4px;margin:4px 0 14px;}
  .seg button{flex:1;text-align:center;font-size:12.5px;font-weight:800;padding:8px;border-radius:10px;color:var(--slate);border:none;background:none;cursor:pointer;}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow);}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:8px 0 14px;}
  .pod{text-align:center;flex:1;max-width:100px;}
  .pod .av{width:50px;height:50px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;border:3px solid #fff;box-shadow:var(--shadow);font-weight:800;}
  .pod .nm{font-size:11px;font-weight:800;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pod .pt{font-size:11px;font-weight:900;color:var(--lime-dark);}
  .pod .stand{border-radius:10px 10px 0 0;margin-top:6px;display:flex;align-items:flex-start;justify-content:center;color:#fff;font-weight:900;padding-top:6px;font-size:14px;}
  .pod.p1 .av{width:60px;height:60px;font-size:26px;background:linear-gradient(135deg,var(--purple),var(--sky));}
  .pod.p1 .stand{height:56px;background:linear-gradient(var(--gold),#e0a800);}
  .pod.p2 .av{background:linear-gradient(135deg,#9aa6b2,#c9d2db);} .pod.p2 .stand{height:42px;background:linear-gradient(#c9d2db,#9aa6b2);}
  .pod.p3 .av{background:linear-gradient(135deg,#c07d49,#e3a877);} .pod.p3 .stand{height:32px;background:linear-gradient(#e3a877,#c07d49);}
  .rrow{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#fff;border-radius:14px;margin-bottom:8px;box-shadow:var(--shadow);font-size:13.5px;}
  .rrow .rk{font-weight:900;width:20px;color:var(--slate);text-align:center;} .rrow .rk.top{color:var(--gold);}
  .rrow .nm{flex:1;font-weight:700;} .rrow .pt{font-weight:900;color:var(--lime-dark);}
  .rrow.mine{background:var(--ink);color:#fff;} .rrow.mine .rk,.rrow.mine .pt{color:var(--lime);}

  /* profile */
  .pava{width:80px;height:80px;border-radius:50%;margin:10px auto 8px;background:linear-gradient(135deg,var(--purple),var(--sky));display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;border:4px solid #fff;box-shadow:var(--shadow);}
  .pname{text-align:center;font-size:18px;font-weight:900;}
  .pstreak{text-align:center;font-size:12px;font-weight:800;color:var(--coral);margin-top:4px;}
  .p3{display:flex;background:#fff;border-radius:16px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden;}
  .p3 .c{flex:1;text-align:center;padding:14px 4px;} .p3 .c + .c{border-left:1px solid #eef1f4;}
  .p3 .v{font-size:19px;font-weight:900;} .p3 .l{font-size:10px;color:var(--slate);font-weight:700;margin-top:2px;}
  .cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .cell{background:#fff;border-radius:15px;padding:13px 6px 10px;text-align:center;box-shadow:var(--shadow);}
  .cell .em{font-size:30px;} .cell .nm{font-size:10.5px;font-weight:800;margin-top:6px;}
  .cell.lock{background:#eef1f4;box-shadow:none;} .cell.lock .em,.cell.lock .nm{filter:grayscale(1);opacity:.5;}

  /* nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.97);border-top:1px solid var(--cloud);display:flex;justify-content:space-around;align-items:center;backdrop-filter:blur(8px);z-index:20;}
  .nav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;font-weight:800;color:#9aa6b2;flex:1;height:100%;border:none;background:none;cursor:pointer;}
  .nav button .ic{font-size:19px;} .nav button.active{color:var(--lime-dark);}

  /* camera */
  .cam{position:fixed;inset:0;background:#000;z-index:70;display:none;flex-direction:column;}
  .cam.show{display:flex;}
  .cam video{flex:1;width:100%;object-fit:cover;background:#000;}
  .cam .guide{position:absolute;top:0;left:0;right:0;padding:max(16px,env(safe-area-inset-top)) 16px 0;color:#fff;text-align:center;font-weight:800;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.7);}
  .cam .bar{padding:16px 16px calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:12px;align-items:center;background:#000;color:#fff;}
  .cam #camStatus{font-size:13px;min-height:18px;text-align:center;font-weight:700;}
  .cam .shoot{width:72px;height:72px;border-radius:50%;background:#fff;border:5px solid #b9b9b9;cursor:pointer;}
  .cam .shoot:active{transform:scale(.92);}
  .cam .close{max-width:200px;}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s;z-index:80;white-space:nowrap;max-width:90%;}
  .toast.show{opacity:1;}
  .splash{position:fixed;inset:0;background:linear-gradient(140deg,#84db52,#4FA52B);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:60;gap:16px;}
  .splash .mk{font-size:48px;font-weight:900;letter-spacing:1px;}
  .spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"></div>
  <nav class="nav" id="nav">
    <button data-tab="home" class="active"><span class="ic">🏠</span>홈</button>
    <button data-tab="quests"><span class="ic">📜</span>퀘스트</button>
    <button data-tab="rank"><span class="ic">🏆</span>랭킹</button>
    <button data-tab="profile"><span class="ic">👤</span>나</button>
  </nav>
  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
  <div class="cam" id="cam">
    <div class="guide" id="camGuide">대상을 화면에 담고 촬영하세요</div>
    <video id="camVideo" autoplay playsinline muted></video>
    <div class="bar"><div id="camStatus"></div><div class="shoot" id="shootBtn"></div>
      <button class="btn sec close" id="camClose">닫기</button></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="splash" id="splash"><div class="mk">WIGO ◍</div><div class="spinner"></div><div style="opacity:.92;font-size:13px">모험을 준비하는 중...</div></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://zykyraorkcpekzlzrmrl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3tXjM0NhMlGe6j6Bfu_b2w_LmTFj6Yb';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

const BADGE_ICON = { first_step:'👟', streak_7:'🔥', streak_30:'📅', walker_10k:'🏅', walker_100k:'🥇',
  explorer:'🧭', observer:'👁️', night_walker:'🌇', early_bird:'🌅', park_master:'🌳', cafe_hopper:'☕',
  level_10:'⭐', social:'🤝', weekly_hero:'🏆', collector:'📦' };
const TYPE_EMOJI = { distance:'🚶', visit:'📍', observe:'👀' };
const TYPE_LABEL = { distance:'거리', visit:'방문', observe:'관찰' };

// ===== 범용 사진 검증 프로그램 (WigoVerifier) =====
const WigoVerifier = {
  analyze(canvas){
    const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height; const d=ctx.getImageData(0,0,w,h).data;
    let r=0,g=0,b=0,n=0; const lums=[]; const step=4*Math.max(1,Math.floor((w*h)/20000));
    for(let i=0;i<d.length;i+=step){ r+=d[i];g+=d[i+1];b+=d[i+2];n++; lums.push(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]); }
    r/=n;g/=n;b/=n; const mean=lums.reduce((a,c)=>a+c,0)/lums.length;
    const variance=lums.reduce((a,c)=>a+(c-mean)*(c-mean),0)/lums.length;
    return { r,g,b,mean,contrast:Math.sqrt(variance) };
  },
  verify(meta, canvas){
    const a=this.analyze(canvas);
    const lit=a.mean>22&&a.mean<242, hasContent=a.contrast>13;
    const warm=a.r>a.b+12, red=a.r>a.g+16&&a.r>a.b+16, colorful=a.contrast>28;
    const obj=(meta&&meta.object)||''; let matched=true, hint='';
    if(obj==='red_sign'){ matched=red||a.r>a.g+8; hint='빨간색 대상'; }
    else if(obj==='sunset'){ matched=warm; hint='노을빛'; }
    else if(obj==='flower'||obj==='mural'){ matched=colorful; hint='또렷한 색감'; }
    else { matched=hasContent; hint='피사체'; }
    let score=0.45*Math.min(1,a.contrast/45)+0.2*(lit?1:0)+0.35*(matched?1:0);
    const pass=lit&&hasContent&&matched;
    const reason=!lit?'화면이 가려졌거나 너무 어두워요':!hasContent?'피사체가 또렷하지 않아요':!matched?`${hint}을(를) 찾지 못했어요`:'일치 확인';
    return { pass, score:Math.round(Math.min(1,score)*100), reason };
  }
};

async function boot(){
  try{
    let { data:{ session } } = await sb.auth.getSession();
    if(!session){ const { error } = await sb.auth.signInAnonymously(); if(error) throw error; }
    await loadProfile(); await computeAttendance(); await loadAuthState(); loadStepsLocal();
    if(localStorage.getItem('wigo_ped_consent_'+(S.profile?S.profile.id:'x'))==='1'){
      S.pedConsented=true; startPedometer().catch(()=>{});
    }
    $('splash').style.display='none'; setupNav(); wireCamera(); render();
  }catch(e){
    $('splash').innerHTML='<div style="padding:24px;text-align:center"><div class="mk">WIGO</div><p style="margin-top:10px">로그인 실패. 대시보드에서 <b>Anonymous sign-ins</b>를 켜주세요.</p><pre style="font-size:11px;opacity:.8">'+(e.message||e)+'</pre></div>';
  }
}
async function loadProfile(){
  const uid=(await sb.auth.getUser()).data.user.id;
  let { data }=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();
  if(!data){ await new Promise(r=>setTimeout(r,800)); ({ data }=await sb.from('profiles').select('*').eq('id',uid).maybeSingle()); }
  S.profile=data||{ id:uid,nickname:'walker',level:1,xp:0,coins:0,total_distance_m:0,total_missions:0,current_streak:0 };
}

// ===== 출석 =====
function localKey(){ return 'wigo_attend_'+(S.profile?S.profile.id:'x'); }
function localAttend(){ try{ return new Set(JSON.parse(localStorage.getItem(localKey())||'[]')); }catch{ return new Set(); } }
function saveLocalAttend(s){ localStorage.setItem(localKey(), JSON.stringify([...s])); }
async function computeAttendance(){
  const set=localAttend();
  S.attendance=set; computeStreakLocal();
}
function computeStreakLocal(){ let s=0; const d=new Date(); if(!S.attendance.has(ymd(d))) d.setDate(d.getDate()-1); while(S.attendance.has(ymd(d))){ s++; d.setDate(d.getDate()-1);} S.streak=s; }
function checkInToday(){ const s=localAttend(),t=ymd(new Date()); if(s.has(t)) return false; s.add(t); saveLocalAttend(s); S.attendance.add(t); computeStreakLocal(); return true; }

  const uid=S.profile.id;

  }).join('');

// ===== 미션 받기 =====
async function roll(){
  const btn=$('rollBtn'); if(btn){ btn.disabled=true; btn.textContent='🎲 생성 중...'; }
  try{
    const pos=await getPos();
    const { data,error }=await sb.functions.invoke('generate-mission',{ body:{ lat:pos.lat,lng:pos.lng } });
    if(error) throw error;
    if(!data||data.success!==true){ toast(errMsg(data&&data.error)); return; }
    S.pending=data; showPreview(data);
  }catch(e){ toast('오류: '+(e.message||e)); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='🎲 미션 굴리기'; } }
}
function getPos(){ return new Promise((res)=>{ if(!navigator.geolocation) return res({lat:37.5665,lng:126.9780});
  navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
    ()=>{ toast('위치 권한이 없어 기본 위치(서울)로 진행해요'); res({lat:37.5665,lng:126.9780}); },{ enableHighAccuracy:true,timeout:8000 }); }); }
function showPreview(d){
  const t=d.template; const obs=t.type==='observe';
  const rows=[
    `<div class="mrow"><span class="k">난이도</span><span class="v">${DIFF_STARS[t.difficulty]||''} ${DIFF_LABEL[t.difficulty]||''}</span></div>`,
    (t.type==='distance'&&t.target_value)?`<div class="mrow"><span class="k">거리</span><span class="v">약 ${(t.target_value/1000).toFixed(1)} km</span></div>`:'',
    t.est_minutes?`<div class="mrow"><span class="k">예상 시간</span><span class="v">약 ${t.est_minutes}분</span></div>`:'',
    `<div class="mrow"><span class="k">인증 방식</span><span class="v">${obs?'📷 카메라 사진':'📍 GPS 자동'}</span></div>`
  ].join('');
  openSheet(`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="muted" style="font-weight:800">미션 미리보기</span></div>
    <div class="mcard"><div class="hd"><div class="label">TODAY'S MISSION 🎲</div><div class="ttl">${TYPE_EMOJI[t.type]} ${t.title}</div>
      <div class="tags"><span class="chip">${TYPE_LABEL[t.type]}</span>${obs?'<span class="chip">📷 사진 인증</span>':'<span class="chip">📍 GPS</span>'}</div></div>
      <div class="bd">${rows}
        <div class="rewardbox"><span class="em">🎁</span><div><div class="r1">✨ +${t.xp_reward} XP · 🪙 ${t.coin_reward}</div><div class="r2">레벨업 · 뱃지 획득 가능</div></div></div>
      </div></div>
    <div class="dots"><span class="dot"></span><span class="dot ${S.freeRerolls>0?'':'off'}"></span><span class="dot off"></span> 무료 재굴리기 ${S.freeRerolls}/2</div>
    <div style="display:flex;gap:10px"><button class="btn sec" id="rerollBtn" style="flex:1">🎲 다시 굴리기</button><button class="btn pri" id="acceptBtn" style="flex:1.3">수락하기</button></div>`);
  $('acceptBtn').onclick=()=>{ closeSheet(); S.tab='home'; navActive('home'); render(); toast('미션 수락! 산책을 시작해요 🚶'); };
  $('rerollBtn').onclick=async()=>{ if(S.freeRerolls<=0){ toast('무료 다시굴리기를 모두 썼어요 (광고는 앱 버전에서)'); return; }
    S.freeRerolls--; await sb.from('user_missions').update({status:'abandoned'}).eq('id',d.user_mission.id); closeSheet(); roll(); };
}

// ===== 카메라 인증 =====
let camStream=null, camCtx={};
function wireCamera(){ $('shootBtn').onclick=shoot; $('camClose').onclick=closeCam; }
async function startObserve(missionId,target,meta){
  camCtx={ missionId,target,meta }; $('camStatus').textContent=''; $('camGuide').textContent='대상을 화면에 담고 촬영하세요'; $('cam').classList.add('show');
  try{ camStream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false }); $('camVideo').srcObject=camStream; }
  catch(e){ closeCam(); toast('카메라 권한이 필요해요. 설정에서 허용해주세요.'); }
}
function closeCam(){ $('cam').classList.remove('show'); if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }
async function shoot(){
  const v=$('camVideo'); if(!v.videoWidth){ toast('카메라 준비 중...'); return; }
  const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  const res=WigoVerifier.verify(camCtx.meta,c);
  $('camStatus').textContent=res.pass?`✅ 검증 통과 · 일치도 ${res.score}%`:`❌ ${res.reason} (일치도 ${res.score}%) · 다시 촬영`;
  if(res.pass) setTimeout(async()=>{ closeCam(); await completeMission(camCtx.missionId,'observe',0,'verified://'+res.score); },700);
}

// ===== 완료 + 보상 =====
async function completeMission(id,type,target,proofUrl){
  try{
    const pos=await getPos(); const body={ user_mission_id:id,lat:pos.lat,lng:pos.lng };
    if(type==='distance') body.distance_m=target;
    if(type==='observe') body.proof_url=proofUrl||'verified://0';
    const { data,error }=await sb.functions.invoke('complete-mission',{ body });
    if(error) throw error;
    if(!data||data.success!==true){ toast(errMsg(data&&data.error,data&&data.distance_to_target_m)); return; }
    await loadProfile(); await computeAttendance(); showReward(data);
  }catch(e){ toast('오류: '+(e.message||e)); }
}
function showReward(d){
  const r=d.rewards||{}, lvl=d.level_up, badges=(d.new_badges||[]).map(b=>b.name);
  const cols=['#FFC93C','#FF6B5E','#3DA9FC','#fff','#8B5CF6']; let conf='';
  for(let i=0;i<22;i++) conf+=`<span class="conf" style="background:${cols[i%5]};left:${Math.round(Math.random()*100)}%;top:${Math.round(Math.random()*40)}px;animation-delay:${(Math.random()*0.6).toFixed(2)}s;transform:rotate(${Math.round(Math.random()*360)}deg)"></span>`;
  openSheet(`<div class="rwd">${conf}<div class="big">${lvl?'🎊':'🎉'}</div><h3>${lvl?('레벨 업! Lv.'+lvl.to):'미션 완료!'}</h3>
    <div class="pts">✨ +${r.xp||0} XP</div><div class="sub">🪙 +${r.coins||0} 코인 적립</div>
    ${badges.map(b=>`<div class="nb">🏅 새 뱃지 「${b}」 획득!</div>`).join('')}</div>
    <button class="btn pri" style="margin-top:14px" id="rewardOk">확인 · 홈으로</button>`);
  $('rewardOk').onclick=()=>{ closeSheet(); S.tab='home'; navActive('home'); render(); };
}

async function renderQuests(){
  screen.innerHTML=`<div class="top"><div class="brand"><span class="lg">📜</span>퀘스트</div><span class="coins">🪙 <b>${S.profile.coins}</b></span></div><div id="qd"></div>`;
  const wrap=$('qd');
  for(const period of ['daily','weekly']){ try{ await sb.functions.invoke('issue-quests',{ body:{ period } }); }catch(e){} }
  const uid=S.profile.id;
  const { data }=await sb.from('quests').select('*').eq('user_id',uid).gt('expires_at',new Date().toISOString()).order('period');
  if(!wrap) return;
  const daily=(data||[]).filter(q=>q.period==='daily'), weekly=(data||[]).filter(q=>q.period==='weekly');
  wrap.innerHTML=`<h2 class="sec">👟 걸음 리워드 <span class="muted" style="font-weight:600">· 1,000걸음마다 🪙${STEP_REWARD_COIN}</span></h2>${stepRewardCard()}
                  <h2 class="sec">📅 데일리 <span class="muted" style="font-weight:600">· 하루 1회</span></h2>${daily.map(questCard).join('')||emptyQ()}
                  <h2 class="sec">🗓️ 위클리 <span class="muted" style="font-weight:600">· 주 1회</span></h2>${weekly.map(questCard).join('')||emptyQ()}`;
  wrap.querySelectorAll('button[data-q]').forEach(b=> b.onclick=()=>claim(b.dataset.q));
  if($('stepRwBtn')) $('stepRwBtn').onclick=claimStepReward;
}
function emptyQ(){ return `<div class="card prog muted" style="text-align:center;padding:18px">퀘스트가 없어요</div>`; }
function questCard(q){
  const pct=Math.min(Math.round(q.progress/q.goal_value*100),100), done=q.progress>=q.goal_value;
  const title=q.goal_type==='complete_missions'?`미션 ${q.goal_value}개 완료`:(q.goal_type==='walk_distance'?`${(q.goal_value/1000).toFixed(0)}km 걷기`:q.goal_type);
  const fmt=v=> q.goal_type==='walk_distance'?(v>=1000?(v/1000).toFixed(1)+'km':v+'m'):v;
  let tail; if(q.claimed) tail=`<span class="chip green">✅ 보상 완료</span>`; else if(done) tail=`<button class="btn pri sm" data-q="${q.id}">보상 받기</button>`; else tail=`<span class="chip">진행 중</span>`;
  return `<div class="quest ${q.claimed?'locked':''}"><div class="qh"><div class="qt">${title}</div><div class="qr">✨${q.xp_reward} 🪙${q.coin_reward}</div></div>
    <div class="xpbar" style="margin-top:9px"><i style="width:${pct}%"></i></div>
    <div class="qf"><span>${fmt(q.progress)} / ${fmt(q.goal_value)}</span>${tail}</div></div>`;
}
async function claim(qid){
  const btn=document.querySelector(`button[data-q="${qid}"]`);
  if(btn){ btn.disabled=true; btn.textContent='처리 중...'; }
  try{ const { data,error }=await sb.functions.invoke('claim-quest',{ body:{ quest_id:qid } }); if(error) throw error;
    if(!data||data.success!==true){ toast('아직 수령할 수 없어요'); if(btn){btn.disabled=false;btn.textContent='보상 받기';} return; }
    await loadProfile(); toast(`보상 적립! ✨${data.rewards.xp} 🪙${data.rewards.coins}`); renderQuests();
  }catch(e){ toast('오류: '+(e.message||e)); if(btn){btn.disabled=false;btn.textContent='보상 받기';} }
}
function stepRewardCard(){
  const blocks=Math.floor(S.todaySteps/1000);
  const claimable=Math.max(0,blocks-S.stepClaimed);
  const next=(S.stepClaimed+1)*1000;
  const toNext=Math.max(0,next-S.todaySteps);
  const tail = claimable>0
    ? `<button class="btn pri sm tail" id="stepRwBtn">🎁 ${claimable}개 받기</button>`
    : `<span class="chip tail">${S.stepActive?'측정 중':'만보기 꺼짐'}</span>`;
  return `<div class="steprw"><span class="ic">👟</span>
    <div><div class="t">오늘 ${S.todaySteps.toLocaleString()}걸음 · 수령 ${S.stepClaimed}회</div>
      <div class="s">${claimable>0?`받을 수 있는 리워드 ${claimable}개 (확인 필요)`:`다음 리워드까지 ${toNext.toLocaleString()}걸음`}</div></div>
    ${tail}</div>
    ${!S.stepActive?`<div class="muted" style="font-size:11.5px;margin:-2px 2px 4px">홈 화면에서 ‘만보기 시작’을 켜면 걸음이 측정돼요.</div>`:''}`;
}
function claimStepReward(){
  const claimable=Math.floor(S.todaySteps/1000)-S.stepClaimed;
  if(claimable<=0){ toast('아직 받을 리워드가 없어요'); return; }
  openSheet(`<h3>걸음 리워드 수령</h3>
    <p class="muted" style="font-size:13px;margin:8px 0 14px;line-height:1.6">1,000걸음 달성 보상 <b>${claimable}개</b>를 받습니다.<br>총 <b>🪙 ${claimable*STEP_REWARD_COIN} 코인</b>이 적립돼요.</p>
    <button class="btn pri" id="stepRwOk">✅ 확인하고 받기</button>
    <button class="btn sec" id="stepRwNo" style="margin-top:10px">취소</button>`);
  $('stepRwNo').onclick=closeSheet;
  $('stepRwOk').onclick=async()=>{
    const n=Math.floor(S.todaySteps/1000)-S.stepClaimed; if(n<=0){ closeSheet(); return; }
    const gain=n*STEP_REWARD_COIN; S.stepClaimed+=n; saveStepsLocal();
    S.profile.coins=(S.profile.coins||0)+gain;
    try{ await sb.from('profiles').update({ coins:S.profile.coins }).eq('id',S.profile.id); }catch(e){}
    closeSheet(); toast(`🎁 걸음 리워드 적립! 🪙 +${gain}`); renderQuests();
  };
}

// ===== 출석체크 =====
function renderAttendance(){
  const base=new Date(); base.setDate(1); base.setMonth(base.getMonth()+S.calMonth);
  const y=base.getFullYear(), m=base.getMonth(), firstDow=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const today=new Date(), todayStr=ymd(today);
  let cells=''; for(let i=0;i<firstDow;i++) cells+='<div class="day empty"></div>'; let cnt=0;
  for(let dn=1;dn<=days;dn++){ const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`; const att=S.attendance.has(ds); if(att)cnt++; cells+=`<div class="day ${att?'att':''} ${ds===todayStr?'today':''}">${dn}</div>`; }
  const todayAtt=S.attendance.has(todayStr);
  screen.innerHTML=`
    <div class="top"><button class="backbtn" id="attBack">‹ 뒤로</button><div class="brand" style="font-size:17px">출석체크</div><div style="width:54px"></div></div>
    <div class="lvl" style="margin-top:6px;background:linear-gradient(135deg,#FF8A1E,#FF6B5E)"><div class="r"><span class="lab">🔥 ${S.streak}일 연속</span><span>이번 달 ${cnt}일 출석</span></div></div>
    <div class="card" style="padding:16px;margin-top:14px">
      <div class="calhead"><button class="navmo" id="prevMo">‹</button><div style="font-weight:900;font-size:15px">${y}년 ${m+1}월</div><button class="navmo" id="nextMo">›</button></div>
      <div class="cal">${['일','월','화','수','목','금','토'].map(w=>`<div class="wd">${w}</div>`).join('')}${cells}</div>
      <div class="legend"><span class="da"></span> 출석한 날 (주황 원)</div>
    </div>
    <button class="btn ${todayAtt?'sec':'pri'}" id="checkBtn" ${todayAtt?'disabled':''}>${todayAtt?'오늘 출석 완료 ✓':'📅 출석하기'}</button>`;
  $('attBack').onclick=()=>{ S.tab='home'; render(); };
  $('prevMo').onclick=()=>{ S.calMonth--; renderAttendance(); };
  $('nextMo').onclick=()=>{ S.calMonth++; renderAttendance(); };
  $('checkBtn').onclick=()=>{ if(checkInToday()){ toast('오늘 출석 완료! 🔥'); renderAttendance(); } };
}

// ===== 완료 미션 =====
async function renderCompletedMissions(){
  screen.innerHTML=`<div class="top"><button class="backbtn" id="compBack">‹ 뒤로</button><div class="brand" style="font-size:17px">완료 미션</div><div style="width:54px"></div></div>
    <div id="compList"><div class="card prog muted" style="text-align:center;padding:22px">불러오는 중...</div></div>`;
  $('compBack').onclick=()=>{ S.tab='home'; navActive('home'); render(); };
  const uid=S.profile.id;
  const since=new Date(); since.setDate(since.getDate()-10);
  const { data }=await sb.from('user_missions').select('*, mission_templates(*)').eq('user_id',uid).eq('status','completed').gte('completed_at',since.toISOString()).order('completed_at',{ascending:false});
  // 10일 이전 완료 데이터 삭제
  try{ await sb.from('user_missions').delete().eq('user_id',uid).eq('status','completed').lt('completed_at',since.toISOString()); }catch(e){}
  const list=$('compList'); if(!list) return;
  if(!data||!data.length){ list.innerHTML=`<div class="card prog muted" style="text-align:center;padding:26px">완료한 미션이 없어요.<br>첫 번째 미션을 완료해 보세요! 🏅</div>`; return; }
  const byDate={};
  data.forEach(m=>{ const d=(m.completed_at||'').slice(0,10); if(!byDate[d]) byDate[d]=[]; byDate[d].push(m); });
  const today=ymd(new Date()); const yesterday=ymd(new Date(Date.now()-86400000));
  const dateLabel=d=> d===today?'오늘': d===yesterday?'어제': d.slice(5).replace('-','월 ')+'일';
  list.innerHTML=Object.keys(byDate).sort().reverse().map(d=>{
    const items=byDate[d].map(m=>{ const t=m.mission_templates||{};
      return `<div class="card" style="padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:11px">
        <span style="font-size:24px">${TYPE_EMOJI[t.type]||'🎯'}</span>
        <div style="flex:1"><div style="font-weight:800;font-size:13.5px">${t.title||'미션'}</div>
          <div style="font-size:11px;color:var(--slate);margin-top:2px">${DIFF_LABEL[t.difficulty]||''} · ✨${m.xp_earned||0} XP · 🪙${m.coins_earned||0}</div></div>
        <span class="chip green">✅</span></div>`;}).join('');
    return `<h2 class="sec">${dateLabel(d)} <span class="muted" style="font-weight:600;font-size:11.5px">${d}</span></h2>${items}`;
  }).join('');
}

// ===== 랭킹 =====
function seasonWeek(){ const n=new Date(); const d=Math.ceil((((n-new Date(n.getFullYear(),0,1))/86400000)+1)/7); return `${n.getFullYear()}-W${String(d).padStart(2,'0')}`; }
async function renderRank(){
  screen.innerHTML=`<div class="top"><div class="brand"><span class="lg">🏆</span>랭킹</div><span class="coins">🪙 <b>${S.profile.coins}</b></span></div>
    <div class="seg"><button class="${S.rankScope==='friends'?'on':''}" id="sf">친구</button><button class="${S.rankScope==='all'?'on':''}" id="sa">전체</button></div>
    <div style="text-align:center;font-size:12px;font-weight:800;color:var(--slate);margin-bottom:6px">🏆 이번 주 시즌 · 월요일 리셋</div><div id="rk"></div>`;
  $('sf').onclick=()=>{ S.rankScope='friends'; renderRank(); }; $('sa').onclick=()=>{ S.rankScope='all'; renderRank(); };
  const { data }=await sb.from('leaderboard_public').select('*').eq('season_week',seasonWeek()).order('rank',{ascending:true}).limit(50);
  const rk=$('rk'); if(!rk) return;
  let list=data||[]; if(S.rankScope==='friends') list=list.filter(e=>e.user_id===S.profile.id);
  if(!list.length){ rk.innerHTML=`<div class="card prog muted" style="text-align:center;padding:22px">아직 이번 주 랭킹 기록이 없어요.<br>미션을 완료하면 등록돼요!</div>`; return; }
  const top=list.slice(0,3), rest=list.slice(3);
  const av=e=>(e.nickname||'?')[0];
  const pods=[];
  if(top[1]) pods.push(`<div class="pod p2"><div class="av">${av(top[1])}</div><div class="nm">${top[1].nickname||'익명'}</div><div class="pt">${top[1].weekly_xp}P</div><div class="stand">2</div></div>`);
  if(top[0]) pods.push(`<div class="pod p1"><div class="av">${av(top[0])}</div><div class="nm">${top[0].nickname||'익명'}</div><div class="pt">${top[0].weekly_xp}P</div><div class="stand">1</div></div>`);
  if(top[2]) pods.push(`<div class="pod p3"><div class="av">${av(top[2])}</div><div class="nm">${top[2].nickname||'익명'}</div><div class="pt">${top[2].weekly_xp}P</div><div class="stand">3</div></div>`);
  const rows=rest.map(e=>`<div class="rrow ${e.user_id===S.profile.id?'mine':''}"><span class="rk">${e.rank}</span><div class="av" style="width:30px;height:30px;font-size:14px;border-width:2px">${av(e)}</div><span class="nm">${e.nickname||'익명'} <span class="chip" style="font-size:9px">Lv.${e.level}</span></span><span class="pt">${e.weekly_xp}P</span></div>`).join('');
  rk.innerHTML=`<div class="podium">${pods.join('')}</div>${rows}`;
}

      <button class="btn pri" id="googleBtn">🔗 Google 계정으로 가입/연결</button></div>`:''}

        <div style="font-size:11px;color:var(--slate);margin-top:2px">기록이 계정에 안전하게 저장됩니다.</div></div></div>`:''}

function errMsg(code,dist){ const m={ TOO_MANY_ACTIVE:'진행 중 미션이 너무 많아요',NO_TEMPLATE:'지금 가능한 미션이 없어요',LOCATION_NOT_REACHED:`목표까지 ${dist||0}m 남았어요`,MISSION_EXPIRED:'미션이 만료됐어요',ALREADY_COMPLETED:'이미 완료했어요',UNAUTHENTICATED:'로그인이 필요해요' }; return m[code]||('오류'+(code?' ('+code+')':'')); }

// ===== 만보기 (가속도 센서 기반, 전경 측정) =====
// 참고: 설치된 PWA는 앱이 열려 있는 동안만 측정됩니다(브라우저 보안 정책).
//       하루 종일 백그라운드 자동 카운트는 네이티브 앱(HealthKit/Google Fit)에서 지원됩니다.
function stepKey(){ return 'wigo_steps_'+(S.profile?S.profile.id:'x')+'_'+ymd(new Date()); }
function stepClaimKey(){ return 'wigo_stepclaim_'+(S.profile?S.profile.id:'x')+'_'+ymd(new Date()); }
let _lastPersisted=0;
function loadStepsLocal(){
  S.todaySteps = parseInt(localStorage.getItem(stepKey())||'0',10)||0;
  S.stepClaimed = parseInt(localStorage.getItem(stepClaimKey())||'0',10)||0;
  _lastPersisted = S.todaySteps;  // 이번 세션에서 새로 센 걸음만 DB 반영
}
function saveStepsLocal(){ localStorage.setItem(stepKey(), String(S.todaySteps)); localStorage.setItem(stepClaimKey(), String(S.stepClaimed)); }

let _emaMag=9.8, _stepUp=false, _lastStepTs=0, _uiThrottle=0, _persistTimer=null;
function onMotion(e){
  const a=e.accelerationIncludingGravity||e.acceleration; if(!a) return;
  const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
  _emaMag=_emaMag*0.8+mag*0.2;
  const now=Date.now();
  if(_emaMag>11.6 && !_stepUp && now-_lastStepTs>280){ _stepUp=true; _lastStepTs=now; addStep(); }
  if(_emaMag<10.3) _stepUp=false;
}
function addStep(){
  S.todaySteps++; saveStepsLocal();
  const now=Date.now();
  if(now-_uiThrottle>400){ _uiThrottle=now; if(S.tab==='home') updateStepUI(); }
  if(!_persistTimer) _persistTimer=setTimeout(()=>{ _persistTimer=null; persistSteps(); }, 4000);
}
async function persistSteps(){
  const delta=S.todaySteps-_lastPersisted; if(delta<=0) return; _lastPersisted=S.todaySteps;
  S.profile.total_steps=(S.profile.total_steps||0)+delta;
  S.profile.total_distance_m=(S.profile.total_distance_m||0); // 거리는 미션 GPS로 누적, 걸음거리는 표시용
  try{ await sb.from('profiles').update({ total_steps:S.profile.total_steps }).eq('id',S.profile.id); }catch(e){}
}
function updateStepUI(){ const el=$('stepCard'); if(el) renderStepCard(); }
function renderStepCard(){
  const el=$('stepCard'); if(!el) return;
  const km=(S.todaySteps*STRIDE_M/1000).toFixed(2);
  const claimable=Math.floor(S.todaySteps/1000)-S.stepClaimed;
  el.innerHTML=`<div class="steps">
    <div class="r"><div><div><span class="big">${S.todaySteps.toLocaleString()}</span><span class="unit">걸음</span></div>
      <div class="sub">🚶 약 ${km} km · 오늘</div></div>
      ${S.stepActive?'<span class="live"><span class="ld"></span>측정 중</span>':''}</div>
    ${S.stepActive
      ? (claimable>0?`<button class="pedbtn" id="stepClaimBtn">🎁 걸음 리워드 ${claimable}개 받기</button>`:'')
      : (!S.pedConsented?`<button class="pedbtn" id="pedStart">▶ 만보기 시작</button>`:'')}</div>`;
  if($('pedStart')) $('pedStart').onclick=startPedometerConsent;
  if($('stepClaimBtn')) $('stepClaimBtn').onclick=()=>{ S.tab='quests'; navActive('quests'); render(); };
}
// 권한·데이터 이용 동의 안내(법적) 후 센서 시작
function startPedometerConsent(){
  openSheet(`<h3>만보기 켜기</h3>
    <p class="muted" style="font-size:13px;margin:8px 0 4px;line-height:1.6">걸음 수 측정을 위해 <b>모션 센서</b>에 접근합니다. 데이터는 걸음·거리 기록과 리워드에만 사용되며 기기/계정에 저장됩니다.</p>
    <ul class="muted" style="font-size:12px;line-height:1.7;margin:8px 0 14px;padding-left:18px">
      <li>앱이 열려 있는 동안만 측정돼요(브라우저 정책)</li>
      <li>위치(GPS)는 미션 수행 시에만 사용돼요</li>
      <li>동의 및 <a href="./privacy.html" target="_blank" style="color:var(--lime-dark);font-weight:700">개인정보 처리방침</a></li>
    </ul>
    <button class="btn pri" id="pedAgree">동의하고 시작</button>
    <button class="btn sec" id="pedCancel" style="margin-top:10px">취소</button>`);
  $('pedCancel').onclick=closeSheet;
  $('pedAgree').onclick=async()=>{
    localStorage.setItem('wigo_ped_consent_'+(S.profile?S.profile.id:'x'),'1');
    S.pedConsented=true; closeSheet(); await startPedometer();
  };
}
async function startPedometer(){
  try{
    if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      const p=await DeviceMotionEvent.requestPermission(); // iOS 13+
      if(p!=='granted'){ toast('모션 센서 권한이 필요해요'); return; }
    }
    if(typeof DeviceMotionEvent==='undefined'){ toast('이 기기/브라우저는 모션 센서를 지원하지 않아요'); return; }
    window.addEventListener('devicemotion', onMotion);
    S.stepActive=true; renderStepCard(); toast('만보기 시작! 걸어보세요 🚶');
  }catch(e){ toast('만보기 시작 실패: '+(e.message||e)); }
}

// ===== 인증 상태(게스트/구글) =====
async function loadAuthState(){
  const { data:{ user } }=await sb.auth.getUser();
  S.isAnon = user ? (user.is_anonymous===true || (!user.email && (!user.identities||user.identities.length===0))) : true;
  S.email = user ? user.email : null;
}
async function linkGoogle(){
  try{
    const redirectTo = location.origin + location.pathname;
    let err;
    if(S.isAnon){
      ({ error: err } = await sb.auth.linkIdentity({ provider:'google', options:{ redirectTo } }));
    } else {
      ({ error: err } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo } }));
    }
    if(err) throw err;
  }catch(e){
    const msg = e.message||String(e);
    if(msg.toLowerCase().includes('not enabled')||msg.toLowerCase().includes('provider'))
      toast('Supabase 대시보드에서 Google 로그인을 활성화해주세요');
    else if(msg.toLowerCase().includes('redirect'))
      toast('Supabase Redirect URL 등록이 필요해요 (대시보드 확인)');
    else
      toast('Google 연결 오류: '+msg);
  }
}

// ===== PWA =====
if('serviceWorker' in navigator){ window.addEventListener('load',()=> navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); S.deferredPrompt=e; const bar=$('installBar'); if(bar){ bar.classList.add('show'); const btn=$('installBtn'); if(btn) btn.onclick=doInstall; } });
async function doInstall(){ if(!S.deferredPrompt) return; S.deferredPrompt.prompt(); await S.deferredPrompt.userChoice; S.deferredPrompt=null; const bar=$('installBar'); if(bar) bar.classList.remove('show'); }

boot();
</script>
